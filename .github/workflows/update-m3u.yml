name: Update multicast M3U

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: update-m3u-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # 避免每次工作流都重新下载 Chromium（常占数分钟）
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        env:
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: "600000"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python scripts/update_multicast_m3u.py --output-dir "${{ github.workspace }}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mapfile -t m3u < <(find . -maxdepth 1 -name '*4K.m3u' -type f)
          if [ "${#m3u[@]}" -gt 0 ]; then git add -f "${m3u[@]}"; fi
          if git diff --cached --quiet; then
            echo "No M3U changes."
          else
            git commit -m "chore: refresh regional multicast M3U playlists"
            git push
          fi
